<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L2 Plumbing Quiz</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Barlow+Condensed:wght@700;800&family=Barlow:wght@400;500&display=swap');
:root{--bg:#0f0f0f;--surface:#181818;--border:#2a2a2a;--accent:#e8c547;--accent2:#4ec9b0;--danger:#f44747;--success:#4ec94e;--warning:#e89c47;--text:#d4d4d4;--muted:#666;--ok-bg:#1a2e1a;--bad-bg:#2e1a1a;--warn-bg:#2e241a}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:28px 16px}
.wrap{width:100%;max-width:680px}
.screen{display:none}.screen.active{display:block}
.title{font-family:'Barlow Condensed',sans-serif;font-size:2rem;font-weight:800;color:var(--accent);letter-spacing:0.04em;text-transform:uppercase}
.subtitle{font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--muted);margin-top:2px;letter-spacing:0.08em}
header{width:100%;max-width:680px;border-bottom:1px solid var(--border);padding-bottom:16px;margin-bottom:24px}

/* STATS GRID */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.stat-card{background:var(–surface);border:1px solid var(–border);border-radius:4px;padding:14px 16px}
.stat-card .big{font-family:‘Barlow Condensed’,sans-serif;font-size:2rem;font-weight:700;color:var(–accent);line-height:1}
.stat-card .lbl{font-family:‘DM Mono’,monospace;font-size:0.65rem;color:var(–muted);letter-spacing:0.08em;margin-top:4px}

/* SECTION HEADERS */
.sec-hd{font-family:‘DM Mono’,monospace;font-size:0.65rem;color:var(–muted);letter-spacing:0.1em;text-transform:uppercase;margin:20px 0 10px}

/* FILTERS */
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.fbtn{font-family:‘DM Mono’,monospace;font-size:0.65rem;padding:4px 10px;border-radius:3px;border:1px solid var(–border);background:transparent;color:var(–muted);cursor:pointer;transition:all 0.15s;letter-spacing:0.06em}
.fbtn.active{border-color:var(–accent);color:var(–accent);background:rgba(232,197,71,0.07)}

/* BUTTONS */
.btn-row{display:flex;gap:8px;flex-wrap:wrap}
.btn{font-family:‘Barlow Condensed’,sans-serif;font-size:0.95rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;padding:10px 20px;border-radius:3px;border:1px solid var(–border);background:transparent;color:var(–text);cursor:pointer;transition:all 0.15s}
.btn:hover:not(:disabled){background:var(–surface)}
.btn:disabled{opacity:0.35;cursor:default}
.btn.primary{border-color:var(–accent);color:var(–accent)}
.btn.warn{border-color:var(–warning);color:var(–warning)}
.btn.danger{border-color:var(–danger);color:var(–danger)}

/* HISTORY */
.hist-item{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-top:1px solid var(–border);font-size:0.85rem}
.hist-item .pct{font-family:‘DM Mono’,monospace;font-size:0.8rem;color:var(–accent)}
.hist-item .meta-s{color:var(–muted);font-size:0.75rem}

/* WEAK SPOTS LIST */
.weak-item{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;padding:9px 0;border-top:1px solid var(–border);font-size:0.85rem;line-height:1.5}
.weak-item .fails{font-family:‘DM Mono’,monospace;font-size:0.75rem;color:var(–danger);white-space:nowrap;margin-top:2px}

/* QUIZ */
.progress-track{width:100%;height:3px;background:var(–border);border-radius:2px;margin-bottom:20px;overflow:hidden}
.progress-fill{height:100%;background:var(–accent);transition:width 0.3s;border-radius:2px}
.meta-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.badge{font-family:‘DM Mono’,monospace;font-size:0.65rem;padding:3px 8px;border-radius:3px;background:var(–surface);color:var(–muted);border:1px solid var(–border)}
.badge.cat{background:rgba(78,201,176,0.1);color:var(–accent2);border-color:rgba(78,201,176,0.2)}
.badge.ws-badge{background:rgba(232,156,71,0.1);color:var(–warning);border-color:rgba(232,156,71,0.2)}
.qtext{font-size:1rem;font-weight:500;line-height:1.6;color:#e8e8e8;margin-bottom:16px}
.options{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.opt{background:transparent;border:1px solid var(–border);border-radius:3px;padding:11px 14px;color:var(–text);font-family:‘Barlow’,sans-serif;font-size:0.9rem;text-align:left;cursor:pointer;transition:all 0.15s;display:flex;align-items:flex-start;gap:10px;line-height:1.4}
.opt:hover:not(:disabled){border-color:var(–accent);color:var(–accent);background:rgba(232,197,71,0.04)}
.opt:disabled{cursor:default}
.opt.correct{border-color:var(–success);background:var(–ok-bg);color:var(–success)}
.opt.wrong{border-color:var(–danger);background:var(–bad-bg);color:var(–danger)}
.okey{font-family:‘DM Mono’,monospace;font-size:0.65rem;color:var(–muted);min-width:14px;margin-top:2px}
.opt.correct .okey,.opt.wrong .okey{color:inherit;opacity:0.6}
.fb{padding:12px 14px;border-radius:3px;font-size:0.85rem;line-height:1.6;display:none;margin-bottom:14px}
.fb.show{display:block}
.fb.ok{background:var(–ok-bg);border-left:3px solid var(–success);color:#9fd49f}
.fb.bad{background:var(–bad-bg);border-left:3px solid var(–danger);color:#d49f9f}
.ws-banner{background:var(–warn-bg);border-left:3px solid var(–warning);color:#d4b07f;font-size:0.8rem;padding:10px 14px;border-radius:3px;margin-bottom:16px;line-height:1.5}

/* RESULT */
.result-big{font-family:‘Barlow Condensed’,sans-serif;font-size:5rem;font-weight:800;color:var(–accent);line-height:1;text-align:center}
.result-sub{font-size:0.9rem;color:var(–muted);text-align:center;margin:6px 0 20px}
.cleared-msg{background:var(–ok-bg);border-left:3px solid var(–success);color:#9fd49f;font-size:0.85rem;padding:10px 14px;border-radius:3px;margin-bottom:16px}
.missed-item{padding:10px 0;border-top:1px solid var(–border);font-size:0.85rem;color:var(–muted);line-height:1.5}
.missed-item strong{color:var(–text);font-weight:500}
.empty-state{font-size:0.85rem;color:var(–muted);padding:8px 0}
</style>

</head>
<body>
<header>
  <div class="title">L2 Plumbing — Quiz</div>
  <div class="subtitle">ELECTRICAL · SCIENTIFIC · PROCESSES · H&S · CONSTRUCTION</div>
</header>

<div class="wrap">

<!-- HOME -->

<div id="s-home" class="screen active">
  <div class="stats-grid">
    <div class="stat-card"><div class="big" id="h-total">0</div><div class="lbl">QUESTIONS ANSWERED</div></div>
    <div class="stat-card"><div class="big" id="h-weak">0</div><div class="lbl">WEAK SPOTS</div></div>
    <div class="stat-card"><div class="big" id="h-sessions">0</div><div class="lbl">SESSIONS</div></div>
    <div class="stat-card"><div class="big" id="h-avg">—</div><div class="lbl">AVG SCORE</div></div>
  </div>

  <div class="sec-hd">Select topic filter</div>
  <div class="filters" id="filters">
    <button class="fbtn active" onclick="setFilter('All',this)">All</button>
    <button class="fbtn" onclick="setFilter('Electrical',this)">Electrical</button>
    <button class="fbtn" onclick="setFilter('Scientific',this)">Scientific</button>
    <button class="fbtn" onclick="setFilter('Processes',this)">Processes</button>
    <button class="fbtn" onclick="setFilter('Health & Safety',this)">H&S</button>
    <button class="fbtn" onclick="setFilter('Construction',this)">Construction</button>
  </div>
  <div class="btn-row" style="margin-bottom:24px">
    <button class="btn primary" onclick="startQuiz(false)">30 random questions</button>
    <button class="btn warn" id="wsBtn" onclick="startQuiz(true)">⚡ Drill weak spots</button>
  </div>

  <div class="sec-hd">Recent sessions</div>
  <div id="hist-list"><div class="empty-state">No sessions yet.</div></div>

  <div class="sec-hd" style="margin-top:24px">Weak spots — top 20 most failed</div>
  <div id="weak-list"><div class="empty-state">None yet — complete some quizzes.</div></div>

  <div class="btn-row" style="margin-top:24px">
    <button class="btn danger" onclick="clearData()">Clear all data</button>
  </div>
</div>

<!-- QUIZ -->

<div id="s-quiz" class="screen">
  <div id="ws-banner" class="ws-banner" style="display:none"></div>
  <div class="progress-track"><div class="progress-fill" id="pbar" style="width:0%"></div></div>
  <div class="meta-row">
    <span class="badge cat" id="catTag"></span>
    <span class="badge" id="qcount"></span>
    <span class="badge">Score <strong id="scoreEl">0</strong></span>
    <span class="badge">Wrong <strong id="wrongEl">0</strong></span>
  </div>
  <div class="qtext" id="qtext"></div>
  <div class="options" id="opts"></div>
  <div class="fb" id="fb"></div>
  <button class="btn primary" id="nbtn" style="display:none" onclick="next()">Next →</button>
</div>

<!-- RESULT -->

<div id="s-result" class="screen">
  <div class="result-big" id="r-pct"></div>
  <div class="result-sub" id="r-sub"></div>
  <div id="cleared-banner" class="cleared-msg" style="display:none"></div>
  <div class="btn-row" style="justify-content:center;margin-bottom:24px">
    <button class="btn primary" onclick="goHome()">Home</button>
    <button class="btn" onclick="startQuiz(false)">Another 30</button>
    <button class="btn warn" id="r-wsBtn" onclick="startQuiz(true)">⚡ Drill weak spots</button>
  </div>
  <div class="sec-hd">Missed this session</div>
  <div id="r-missed"></div>
</div>

</div>

<script>
const STORE='plumbing_quiz_v3';
const WEAK_SIZE=20;
const WEAK_PASS_NEEDED=2;
const SESSION_LIMIT=50;

function loadData(){try{return JSON.parse(localStorage.getItem(STORE))||newData();}catch(e){return newData();}}
function newData(){return{totalAnswered:0,sessions:[],fails:{}};}
function saveData(d){try{localStorage.setItem(STORE,JSON.stringify(d));}catch(e){}}

const Q=[
{c:"Electrical",q:"What is the formula for power using voltage and current?",o:["P = V ÷ I","P = V × I","P = I ÷ V","P = V + I"],a:1,e:"P = V × I. Power (watts) = voltage × current."},
{c:"Electrical",q:"In a parallel circuit, what is the same across all branches?",o:["Current","Resistance","Voltage","Power"],a:2,e:"Voltage is the same across all parallel branches. Current splits."},
{c:"Electrical",q:"Class II appliance — what does it rely on for safety?",o:["Earth conductor","Double insulation, no earth required","SELV supply","RCD protection"],a:1,e:"Class II = double insulated. No earth required. Symbol: square within a square."},
{c:"Electrical",q:"Standard RCD personal protection trip current?",o:["10mA","100mA","30mA","300mA"],a:2,e:"30mA personal protection. 100mA and 300mA = fire and equipment protection."},
{c:"Electrical",q:"When do you prove the test instrument during safe isolation?",o:["Before and after testing the dead circuit","Only before","Only after","At start of day"],a:0,e:"Prove tester BEFORE and AFTER testing the dead circuit. Sandwich the dead test."},
{c:"Electrical",q:"Most common UK domestic earthing arrangement?",o:["TN-S","TT","TN-C-S (PME)","IT"],a:2,e:"TN-C-S (PME). Combined PEN conductor splits at the cut-out."},
{c:"Electrical",q:"Voltage drop limit for a power circuit?",o:["3%","5%","10%","2%"],a:1,e:"5% for power, 3% for lighting — textbook confirmed."},
{c:"Electrical",q:"Which wiring system is fire resistant, used in extreme environments?",o:["SWA","Flat twin and earth","MICC (Pyro)","Conduit"],a:2,e:"MICC (Mineral Insulated Copper Clad / Pyro) — fire resistant."},
{c:"Electrical",q:"SELV stands for?",o:["Safe Electrical Low Voltage","Separated Extra Low Voltage","Standard Extra Low Voltage","Shielded Earth Low Voltage"],a:1,e:"Separated Extra Low Voltage — max 50V AC / 120V DC. Isolated from earth."},
{c:"Electrical",q:"Series circuit: 4Ω + 6Ω + 10Ω. Total resistance?",o:["2Ω","20Ω","2.4Ω","5Ω"],a:1,e:"Series: R = R1 + R2 + R3 = 4 + 6 + 10 = 20Ω."},
{c:"Electrical",q:"Post-2004 Line (Live) conductor colour?",o:["Red","Black","Brown","Blue"],a:2,e:"Post-2004: Brown = Line, Blue = Neutral, Green/Yellow = Earth."},
{c:"Electrical",q:"RCBO combines which two devices?",o:["Fuse and MCB","RCD and MCB","RCD and fuse","MCB and surge protector"],a:1,e:"RCBO = RCD + MCB. Protects against earth fault AND overload."},
{c:"Electrical",q:"In a series circuit, what is the same throughout?",o:["Voltage","Resistance","Current","Power"],a:2,e:"Current is the same throughout a series circuit. Voltage splits."},
{c:"Electrical",q:"Formula for resistance (Ohm's Law)?",o:["R = V × I","R = I ÷ V","R = V ÷ I","R = V + I"],a:2,e:"R = V ÷ I."},
{c:"Electrical",q:"TT earthing differs from TN-C-S because?",o:["Combined PEN conductor","Earth electrode at premises, no metallic return path","Splits neutral at substation","Commercial use only"],a:1,e:"TT uses earth electrode at premises. No metallic return path."},
{c:"Electrical",q:"What does a fuse do that an MCB cannot?",o:["Reset automatically","Protect against earth faults","Melt to break circuit — single use","Detect current imbalance"],a:2,e:"Fuse melts — single use. MCB is resettable."},
{c:"Electrical",q:"PELV vs SELV — key difference?",o:["PELV connected to earth; SELV isolated from earth","Same thing","PELV for lighting only","PELV uses DC only"],a:0,e:"PELV = Protected Extra Low Voltage — connected to earth. SELV = Separated — isolated from earth."},
{c:"Electrical",q:"Current drawn by a 2300W appliance on 230V?",o:["0.1A","23A","10A","100A"],a:2,e:"I = P ÷ V = 2300 ÷ 230 = 10A."},
{c:"Electrical",q:"Standard site voltage for portable tools?",o:["25V","230V","110V","400V"],a:2,e:"110V (yellow) for site portable tools."},
{c:"Electrical",q:"Purpose of equipotential bonding?",o:["Increases current flow","Connects metalwork to prevent voltage differences","Protects against overload","Reduces circuit resistance"],a:1,e:"Bonds metalwork to prevent dangerous voltage differences."},
{c:"Electrical",q:"Which cable is used underground or for mechanical protection?",o:["Flat twin and earth","MICC","SWA (Steel Wire Armoured)","Conduit only"],a:2,e:"SWA — Steel Wire Armoured."},
{c:"Electrical",q:"Old cable colour for Neutral (pre-2004)?",o:["Red","Green","Blue","Black"],a:3,e:"Old: Red = Live, Black = Neutral, Green = Earth."},
{c:"Electrical",q:"Parallel circuit: 6Ω, 12Ω, 4Ω. Total resistance?",o:["22Ω","2Ω","4Ω","0.5Ω"],a:1,e:"1/R = 1/6 + 1/12 + 1/4 = 6/12 = 0.5. R = 2Ω."},
{c:"Electrical",q:"Total parallel resistance is always?",o:["Greater than largest branch","Equal to smallest branch","Less than smallest branch","Average of all branches"],a:2,e:"Always less than the smallest individual branch resistance."},
{c:"Electrical",q:"GS38 requires the use of?",o:["Earthed metalwork","Approved test leads during electrical testing","Circuit isolation before work","RCDs on all circuits"],a:1,e:"GS38 = approved, insulated, fused test leads for electrical testing."},
{c:"Electrical",q:"Power of a 230V appliance drawing 5A?",o:["920W","46W","1150W","235W"],a:2,e:"P = V × I = 230 × 5 = 1150W."},
{c:"Electrical",q:"Class III maximum operating voltage?",o:["25V AC","110V AC","50V AC / 120V DC ripple-free","12V DC only"],a:2,e:"Class III = SELV — max 50V AC or 120V DC ripple-free."},
{c:"Electrical",q:"Step immediately after switching off at the CU in safe isolation?",o:["Test the circuit is dead","Prove tester on a live source","Lock off and fit warning notice","Identify the circuit"],a:2,e:"Lock off and fit warning notice before any testing."},
{c:"Electrical",q:"MCB trips on?",o:["Earth leakage only","Overload or short circuit","Voltage drop","Neutral fault"],a:1,e:"MCB trips on overload or short circuit. Earth leakage = RCD."},
{c:"Electrical",q:"Resistance in a metallic conductor increases when?",o:["Cross-sectional area increases","Length decreases","Temperature increases","Voltage increases"],a:2,e:"Resistance increases with temperature and length; decreases with larger cross-section."},
{c:"Scientific",q:"Specific heat capacity of water?",o:["4.5 kJ/kg·K","4.187 kJ/kg·K","3.9 kJ/kg·K","4.0 kJ/kg·K"],a:1,e:"4.187 kJ/kg·K — textbook confirmed."},
{c:"Scientific",q:"Latent heat causes?",o:["Temperature rise","Change of state with no temperature change","Thermal expansion","Increased pressure"],a:1,e:"Latent heat changes state with no temperature change during transition."},
{c:"Scientific",q:"1 metre head of water = how much pressure?",o:["1 kPa","9.81 kPa","100 kPa","0.981 kPa"],a:1,e:"1m head = 9.81 kPa. ~10 kPa in practice."},
{c:"Scientific",q:"Boyle's Law — pressure and volume are?",o:["Directly proportional at constant temperature","Inversely proportional at constant temperature","Directly proportional at constant pressure","Inversely proportional at constant pressure"],a:1,e:"P1V1 = P2V2. Inversely proportional at constant temperature."},
{c:"Scientific",q:"Absolute pressure =?",o:["Gauge pressure only","Atmospheric only","Gauge + atmospheric","Gauge − atmospheric"],a:2,e:"Absolute = gauge + atmospheric (101.325 kPa at sea level)."},
{c:"Scientific",q:"Q = ? if m=10kg, c=4.187, ΔT=20°C",o:["837.4 kJ","83.74 kJ","418.7 kJ","209.35 kJ"],a:0,e:"Q = 10 × 4.187 × 20 = 837.4 kJ."},
{c:"Scientific",q:"Dezincification — what is it?",o:["Iron leaching from steel","Zinc leaching from brass in hard water areas","Copper oxidising in chlorinated water","Lead dissolving in soft water"],a:1,e:"Zinc leaches from brass leaving porous structure. Use DZR fittings in hard water areas."},
{c:"Scientific",q:"Tensile strength describes?",o:["Resistance to crushing","Resistance to hammering","Resistance to being pulled apart","Ability to be drawn into wire"],a:2,e:"Tensile strength = resistance to being pulled apart."},
{c:"Scientific",q:"Typical flow/return differential in LPHW?",o:["10°C","40°C","20°C","30°C"],a:2,e:"20°C differential between flow and return."},
{c:"Scientific",q:"Dynamic pressure vs static pressure?",o:["Higher","The same","Lower","Unpredictable"],a:2,e:"Dynamic (flowing) always lower than static (stationary)."},
{c:"Scientific",q:"Relative density less than 1 means?",o:["Sinks","Floats","Dissolves","Reacts with water"],a:1,e:"RD < 1 = floats. RD > 1 = sinks. Water = 1.0."},
{c:"Scientific",q:"Charles's Law — volume and temperature are?",o:["Inversely proportional at constant pressure","Directly proportional at constant pressure","Inversely proportional at constant temperature","Independent"],a:1,e:"Directly proportional at constant pressure."},
{c:"Scientific",q:"Sensible heat does what?",o:["Changes state without changing temperature","Changes temperature without changing state","Causes thermal expansion only","Increases pressure"],a:1,e:"Sensible heat causes temperature change. No change of state."},
{c:"Scientific",q:"Gauge pressure is?",o:["Pressure from absolute zero","Pressure above atmospheric","Pressure at tank bottom","Same as absolute pressure"],a:1,e:"Gauge pressure is measured above atmospheric."},
{c:"Scientific",q:"Electrolytic corrosion requires?",o:["Two identical metals in water","Two dissimilar metals in contact with water present","Copper in hard water","Zinc added to brass"],a:1,e:"Two dissimilar metals + water. One metal corrodes preferentially."},
{c:"Scientific",q:"Density of water?",o:["100 kg/m³","10 kg/m³","1000 kg/m³","500 kg/m³"],a:2,e:"1000 kg/m³ = 1 kg per litre."},
{c:"Scientific",q:"Formula for thermal linear expansion?",o:["length × temperature","length × coefficient × temperature rise","coefficient ÷ temperature","length ÷ coefficient"],a:1,e:"Expansion = original length × coefficient × temperature rise."},
{c:"Scientific",q:"Why is water used in LPHW heating?",o:["It's cheap","High SHC — stores and carries large amounts of heat","Low viscosity","Doesn't expand when heated"],a:1,e:"High SHC (4.187 kJ/kg·K) means it stores and transports heat efficiently."},
{c:"Scientific",q:"Pascal's Law — pressure in a liquid acts?",o:["Downwards only","Upwards only","In direction of flow","Equally in all directions"],a:3,e:"Pascal's Law: pressure acts equally in all directions."},
{c:"Scientific",q:"Copper pipe 4m, temp rise 50°C, coefficient 0.000017/°C. Expansion?",o:["3.4mm","0.34mm","34mm","0.034mm"],a:0,e:"4 × 0.000017 × 50 = 0.0034m = 3.4mm."},
{c:"Scientific",q:"Ferrous metals differ from non-ferrous because?",o:["Contain zinc","Contain iron and will rust","Used only for fittings","Don't conduct electricity"],a:1,e:"Ferrous = contains iron, rusts. Non-ferrous (copper, brass, aluminium) = no iron."},
{c:"Scientific",q:"Ductile material means?",o:["Can be compressed without cracking","Can be drawn into wire or bent without breaking","Returns to original shape","Resists impact"],a:1,e:"Ductile = drawn into wire or bent without breaking. Copper is key example."},
{c:"Scientific",q:"Atmospheric pressure at sea level?",o:["10.1 kPa","1013.25 kPa","101.325 kPa","1.01325 kPa"],a:2,e:"101.325 kPa at sea level."},
{c:"Scientific",q:"Volume = ?",o:["mass × density","density ÷ mass","mass ÷ density","mass + density"],a:2,e:"Volume = mass ÷ density."},
{c:"Processes",q:"R220 copper pipe — characteristics?",o:["Hard temper, thin wall","Half-hard, most common","Soft temper, thick wall, coils, microbore","Hard temper, rarely used"],a:2,e:"R220 — fully annealed (soft), thicker wall. Underground and microbore."},
{c:"Processes",q:"Pipe gain — what does it mean?",o:["Add to cut length","Extra pipe at joints","Subtract from measured length to get correct cut length","Depth of bend former"],a:2,e:"Pipe gain = apparent shortening through a bend. Subtract from measured length."},
{c:"Processes",q:"Maximum notch depth in a joist?",o:["1/4 depth","1/8 depth","1/3 depth","1/5 depth"],a:1,e:"Max notch = 0.125 × joist depth (one eighth). Top, near supports."},
{c:"Processes",q:"Joist hole position in the span?",o:["0.1–0.2 from support","0.25–0.4 from support","Middle third only","Anywhere on neutral axis"],a:1,e:"Holes: 0.25–0.4 of span from support, middle third of joist depth."},
{c:"Processes",q:"PTFE tape on compression fittings?",o:["Yes, male thread","Yes, on olive","No — olive does the sealing","Only Type B"],a:2,e:"Never PTFE on compression. The olive seals when compressed."},
{c:"Processes",q:"Yellow MDPE underground pipe is for?",o:["Cold water mains","Drainage","Gas service pipes","Heating"],a:2,e:"Yellow MDPE = gas. Blue = cold water mains."},
{c:"Processes",q:"Which plastic pipe has shape memory?",o:["uPVC","Polybutylene","PEX","MDPE"],a:2,e:"PEX returns to round shape when heated — useful for push-fit."},
{c:"Processes",q:"What must be applied before soldering a capillary fitting?",o:["PTFE tape","Boss white","Flux","Jointing compound"],a:2,e:"Flux cleans and prevents oxidation so solder bonds correctly."},
{c:"Processes",q:"Type B compression fitting vs Type A?",o:["Uses PTFE not olive","Pipe end flared — used underground","Demountable with tool","No pipe modification"],a:1,e:"Type B (manipulative) — pipe end flared. Used underground where fitting can't be removed."},
{c:"Processes",q:"Maximum hole diameter in a joist?",o:["1/8 depth","1/3 depth","1/4 depth","1/2 depth"],a:2,e:"Max hole = 0.25 × joist depth. Min spacing = 3 × hole diameter."},
{c:"Processes",q:"Purpose of flux in soldering?",o:["Seals the joint","Cleans metal and prevents oxidation","Fills gaps in fitting","Replaces solder in end-feed"],a:1,e:"Flux de-oxidises metal so solder flows and bonds."},

{c:"Health & Safety",q:"PASS technique for fire extinguishers?",o:["Pull, Aim high, Squeeze, Sweep","Pull, Aim at base, Squeeze, Sweep","Point, Aim, Spray, Stand back","Pull, Apply, Smother, Secure"],a:1,e:"Pull → Aim at base → Squeeze → Sweep. Stand 3m back."},

{c:"Health & Safety",q:"Manual Handling Regulations — preferred approach?",o:["Always team lift","Avoid where possible; kinetic technique if unavoidable","Use back belts always","No restrictions under 25kg"],a:1,e:"Avoid where possible. Kinetic technique and mechanical aids if unavoidable."},
{c:"Health & Safety",q:"Asbestos suspected in pre-2000 building?",o:["Mark area and continue","Stop, withdraw, report, licensed contractor only","Remove sample yourself","Wet area and continue"],a:1,e:"STOP → WITHDRAW → REPORT → Licensed contractor only."},

{c:"Health & Safety",q:"Permit to Work vs Method Statement?",o:["PTW informal; MS formal","PTW = formal written authorisation for high-risk work, names persons, time frame, written declaration on completion","PTW for all work; MS for hazardous","They are the same"],a:1,e:"PTW = formal written authorisation. Names persons, time frame. Written declaration required on completion."},
{c:"Construction",q:"Client's on-site representative?",o:["Site Supervisor","Trade Supervisor","Clerk of Works","Building Control Officer"],a:2,e:"Clerk of Works = client's on-site rep. Ensures work meets agreed plans and standards."},
{c:"Construction",q:"Project notifiable to HSE under CDM 2015 when?",o:["Any project over 30 days","30+ days AND 20+ simultaneous workers, OR 500+ person-days","More than 5 workers","Over £100,000"],a:1,e:"Notifiable: 30+ days AND 20+ simultaneous workers, OR 500+ person-days."},
{c:"Construction",q:"Purpose of a Variation Order?",o:["Daily site diary","Formal written instruction authorising scope change, signed by client","Verbal agreement to change work","HSE notice"],a:1,e:"VO = formal written instruction for scope change. Client signs before work proceeds."},

{c:"Construction",q:"A Gantt chart is used to?",o:["Record accidents","Show planned sequence, timing and duration of tasks","List materials","Record labour costs"],a:1,e:"Gantt chart = work programme. Coordinates trades and monitors progress."},

{c:"Construction",q:"Building Control Officer role?",o:["Enforce H&S law","Check building regs compliance at key stages for local authority","Represent client on site","Manage subcontractors"],a:1,e:"BCO = local authority. Checks building regs compliance at key stages."},
{c:"Construction",q:"Legal status of manufacturers' instructions?",o:["Mandatory like Acts","Advisory, but deviation can void warranty and breach regulations","No legal standing","Only mandatory for gas"],a:1,e:"Advisory, but deviation can void warranty and may breach regulations."},
{c:"Construction",q:"Level 2 operative's site authority?",o:["Authorise VOs up to £500","Carry out work as instructed; report problems; cannot authorise variations","Supervise Level 2 autonomously","Sign off RAMS"],a:1,e:"Level 2: carry out work as instructed, report problems, cannot authorise variations."},
{c:"Construction",q:"As-built drawings differ from working drawings because?",o:["Produced before construction","Record what was actually installed","Structural only","Replace the specification"],a:1,e:"As-built = final record of what was actually installed."},
{c:"Construction",q:"Formal quotations must be?",o:["Verbal","In writing","Within 48 hours","Countersigned by HSE"],a:1,e:"Formal quotations must be in writing."},
{c:"Construction",q:"The CDM 2015 H&S file?",o:["Destroyed on completion","Stays with the building until demolition","Kept by principal contractor","Submitted to HSE"],a:1,e:"H&S file stays with the building until demolition."},
{c:"Construction",q:"Maximum possible risk score (both scored 1–5)?",o:["10","15","25","50"],a:2,e:"5 × 5 = 25. 13–25 = High, 6–12 = Medium, 1–5 = Low."}
];

let activeFilter='All',qs=[],cur=0,sc=0,wr=0,sessionMissed=[],answered=false,isWeakSpots=false;
let wsConsecCorrect={};

function qKey(q){return q.c+'||'+q.q;}

function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function goHome(){renderHome();show('s-home');}

function setFilter(f,el){activeFilter=f;document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));el.classList.add('active');}

function getWeakSpots(fails){
  return Q.map(q=>({q,fails:fails[qKey(q)]||0})).filter(x=>x.fails>0).sort((a,b)=>b.fails-a.fails).slice(0,WEAK_SIZE);
}

function renderHome(){
  const d=loadData();
  const fails=d.fails||{};
  const sessions=d.sessions||[];
  const ws=getWeakSpots(fails);

  document.getElementById('h-total').textContent=d.totalAnswered||0;
  document.getElementById('h-weak').textContent=ws.length;
  document.getElementById('h-sessions').textContent=sessions.length;
  document.getElementById('h-avg').textContent=sessions.length?Math.round(sessions.reduce((s,x)=>s+x.pct,0)/sessions.length)+'%':'—';

  const wsDisabled=ws.length===0;
  document.getElementById('wsBtn').disabled=wsDisabled;
  document.getElementById('r-wsBtn').disabled=wsDisabled;

  const hl=document.getElementById('hist-list');
  if(!sessions.length){hl.innerHTML='<div class="empty-state">No sessions yet.</div>';}
  else{hl.innerHTML=sessions.slice().reverse().slice(0,10).map(s=>`<div class="hist-item"><span style="color:var(--muted);font-size:0.8rem">${s.mode==='weak'?'⚡ Weak spots':'📋 '+s.filter} &nbsp;·&nbsp; ${s.total}q</span><span class="pct">${s.pct}%</span></div>`).join('');}

  const wl=document.getElementById('weak-list');
  if(!ws.length){wl.innerHTML='<div class="empty-state">None yet — complete some quizzes.</div>';}
  else{wl.innerHTML=ws.slice(0,10).map(w=>`<div class="weak-item"><span style="flex:1">${w.q.q}</span><span class="fails">${w.fails}✗</span></div>`).join('')+(ws.length>10?`<div class="empty-state" style="padding-top:8px">+${ws.length-10} more</div>`:'' );}
}

function shuf(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a;}

function startQuiz(weakMode){
  const d=loadData();
  isWeakSpots=weakMode;
  wsConsecCorrect={};
  sessionMissed=[];sc=0;wr=0;cur=0;answered=false;
  document.getElementById('scoreEl').textContent=0;
  document.getElementById('wrongEl').textContent=0;

  if(weakMode){
    const ws=getWeakSpots(d.fails||{});
    if(!ws.length){alert('No weak spots yet.');return;}
    qs=shuf(ws.map(w=>w.q));
  } else {
    const pool=activeFilter==='All'?Q:Q.filter(q=>q.c===activeFilter);
    qs=shuf([...pool]).slice(0,30);
  }
  show('s-quiz');
  load();
}

function load(){
  answered=false;
  const q=qs[cur];
  const d=loadData();

  const banner=document.getElementById('ws-banner');
  if(isWeakSpots){
    const remaining=getWeakSpots(d.fails||{}).length;
    banner.style.display='block';
    banner.textContent='⚡ Weak spots mode — '+remaining+' in pool. Pass each twice to clear. Q'+(cur+1)+' of '+qs.length+'.';
  } else {banner.style.display='none';}

  document.getElementById('catTag').textContent=q.c;
  document.getElementById('qcount').textContent=(cur+1)+' / '+qs.length;
  document.getElementById('pbar').style.width=Math.round((cur/qs.length)*100)+'%';
  document.getElementById('qtext').textContent=q.q;
  const fb=document.getElementById('fb');fb.className='fb';fb.textContent='';
  document.getElementById('nbtn').style.display='none';
  const o=document.getElementById('opts');o.innerHTML='';
  const keys=['A','B','C','D'];
  const so=q.o.map((t,i)=>({t,orig:i}));shuf(so);
  so.forEach((opt,i)=>{
    const b=document.createElement('button');b.className='opt';
    b.innerHTML='<span class="okey">'+keys[i]+'</span>'+opt.t;
    b.onclick=()=>pick(opt.orig===q.a,b,so,q);
    o.appendChild(b);
  });
}

function pick(correct,btn,so,q){
  if(answered)return;answered=true;
  const d=loadData();
  d.totalAnswered=(d.totalAnswered||0)+1;
  const k=qKey(q);
  document.querySelectorAll('.opt').forEach((b,i)=>{b.disabled=true;if(so[i].orig===q.a)b.classList.add('correct');});
  const fb=document.getElementById('fb');

  if(correct){
    btn.classList.add('correct');sc++;
    document.getElementById('scoreEl').textContent=sc;
    fb.className='fb ok show';
    let msg='✓ '+q.e;
    if(isWeakSpots){
      wsConsecCorrect[k]=(wsConsecCorrect[k]||0)+1;
      if(wsConsecCorrect[k]>=WEAK_PASS_NEEDED){
        delete d.fails[k];
        msg='✓ '+q.e+' — Cleared from weak spots!';
      } else {
        msg='✓ '+q.e+' — Pass '+(wsConsecCorrect[k])+'/'+WEAK_PASS_NEEDED+' needed to clear.';
      }
    }
    fb.textContent=msg;
  } else {
    btn.classList.add('wrong');wr++;
    document.getElementById('wrongEl').textContent=wr;
    sessionMissed.push(q);
    fb.className='fb bad show';
    fb.textContent='✗ '+q.e;
    d.fails[k]=(d.fails[k]||0)+1;
    if(isWeakSpots)wsConsecCorrect[k]=0;
  }
  saveData(d);
  document.getElementById('nbtn').style.display='inline-block';
}

function next(){cur++;if(cur>=qs.length)showResult();else load();}

function showResult(){
  const pct=Math.round((sc/qs.length)*100);
  document.getElementById('r-pct').textContent=pct+'%';
  document.getElementById('r-sub').textContent=sc+' correct out of '+qs.length+(isWeakSpots?' · weak spots mode':'· '+activeFilter);

  const clearedCount=Object.keys(wsConsecCorrect).filter(k=>wsConsecCorrect[k]>=WEAK_PASS_NEEDED).length;
  const cb=document.getElementById('cleared-banner');
  if(isWeakSpots&&clearedCount>0){cb.style.display='block';cb.textContent='✓ '+clearedCount+' question'+(clearedCount>1?'s':'')+' cleared from weak spots pool.';}
  else{cb.style.display='none';}

  const d=loadData();
  d.sessions=d.sessions||[];
  d.sessions.push({pct,total:qs.length,mode:isWeakSpots?'weak':'normal',filter:activeFilter,ts:Date.now()});
  if(d.sessions.length>SESSION_LIMIT)d.sessions=d.sessions.slice(-SESSION_LIMIT);
  saveData(d);

  const ml=document.getElementById('r-missed');
  if(!sessionMissed.length){ml.innerHTML='<div class="empty-state" style="color:var(--success)">Clean sheet this session.</div>';}
  else{ml.innerHTML=sessionMissed.map(q=>`<div class="missed-item"><strong>[${q.c}]</strong> ${q.q}<br><span style="color:var(--muted);font-size:0.8rem">${q.e}</span></div>`).join('');}

  show('s-result');
}

function clearData(){
  if(confirm('Clear all quiz history and weak spot data?')){try{localStorage.removeItem(STORE);}catch(e){}renderHome();}}

renderHome();
</script>
